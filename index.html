<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>반포동 714-26번지 일대 동의서 징구</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════
           RESET & VARIABLES
        ═══════════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red:        #d71920;
            --red-dark:   #b01219;
            --red-glow:   rgba(215,25,32,.30);
            --navy:       #0f172a;
            --navy-mid:   #1e293b;
            --navy-light: #334155;
            --sb-fg:      #e2e8f0;
            --sb-muted:   #94a3b8;
            --text:       #1e293b;
            --text-md:    #475569;
            --text-muted: #64748b;
            --bg:         #f1f5f9;
            --white:      #ffffff;
            --border:     #e2e8f0;
            --success:    #10b981;
            --r:          10px;
            --r-lg:       16px;
            --sh-sm:      0 1px 4px rgba(0,0,0,.07);
            --sh-md:      0 4px 20px rgba(0,0,0,.09);
            --sh-lg:      0 8px 36px rgba(0,0,0,.12);
            --tr:         all .2s ease;
            --font:       'Noto Sans KR', Arial, sans-serif;
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════════════════
           APP SHELL
        ═══════════════════════════════ */
        .app {
            display: flex;
            width: 100vw;
            height: 100dvh;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ═══════════════════════════════
           SIDEBAR
        ═══════════════════════════════ */
        .sidebar {
            width: clamp(200px, 22vw, 320px);
            flex-shrink: 0;
            background: linear-gradient(175deg, var(--navy) 0%, var(--navy-mid) 100%);
            display: flex;
            flex-direction: column;
        }

        .sidebar-accent {
            height: 4px;
            flex-shrink: 0;
            background: linear-gradient(90deg, var(--red), #ff4c54);
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: clamp(10px,1.3vw,16px) clamp(10px,1.1vw,14px);
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
            scrollbar-color: var(--navy-light) transparent;
        }
        .sidebar-body::-webkit-scrollbar { width: 4px; }
        .sidebar-body::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 2px; }

        .sidebar-header {
            padding-bottom: clamp(10px,1.3vh,14px);
            margin-bottom: clamp(8px,1.1vh,12px);
            border-bottom: 1px solid rgba(255,255,255,.07);
        }

        .sidebar-eyebrow {
            font-size: clamp(9px,.85vw,12px);
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 5px;
        }

        .sidebar-title {
            font-size: clamp(12px,1.15vw,16px);
            font-weight: 700;
            color: var(--sb-fg);
            line-height: 1.55;
            word-break: keep-all;
        }

        /* ── Steps ── */
        .steps { display: flex; flex-direction: column; flex: 1; }

        .step-row { display: flex; flex-direction: column; }

        .step-btn {
            display: flex;
            align-items: flex-start;
            gap: clamp(7px,.8vw,11px);
            padding: clamp(6px,.75vh,9px) clamp(6px,.65vw,9px);
            border: none;
            border-radius: var(--r);
            background: transparent;
            cursor: pointer;
            font-family: var(--font);
            text-align: left;
            width: 100%;
            transition: var(--tr);
            color: var(--sb-muted);
        }
        .step-btn:hover                   { background: rgba(255,255,255,.07); color: var(--sb-fg); }
        .step-btn.active                  { background: rgba(215,25,32,.18); color: #fff; }

        .step-circle {
            width: clamp(20px,1.8vw,26px);
            height: clamp(20px,1.8vw,26px);
            border-radius: 50%;
            border: 2px solid var(--navy-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(9px,.85vw,11px);
            font-weight: 700;
            flex-shrink: 0;
            transition: var(--tr);
            color: var(--sb-muted);
        }
        .step-btn:hover:not(.active) .step-circle { border-color: rgba(255,255,255,.28); color: var(--sb-fg); }
        .step-btn.active              .step-circle { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 0 10px var(--red-glow); }

        .step-label {
            font-size: clamp(9px,.95vw,13px);
            font-weight: 500;
            line-height: 1.5;
            word-break: keep-all;
            padding-top: 1px;
            flex: 1;
        }
        .step-btn.active .step-label { font-weight: 700; }

        .step-connector {
            display: flex;
            padding-left: calc(clamp(6px,.65vw,9px) + clamp(20px,1.8vw,26px)/2 - 1px);
        }
        .step-connector-line {
            width: 2px;
            height: clamp(7px,.9vh,11px);
            background: rgba(255,255,255,.08);
            border-radius: 1px;
        }

        /* ── Live Stats ── */
        .stats-wrap { margin-top: auto; padding-top: clamp(8px,1vh,12px); }

        .stats-card {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: var(--r);
            padding: clamp(9px,1.2vh,14px) clamp(9px,1vw,13px);
        }

        .stats-eyebrow {
            font-size: clamp(10px,.95vw,13px);
            font-weight: 700;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 7px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        .stats-row:last-child { margin-bottom: 0; }
        .stats-lbl {
            font-size: clamp(13px,1.3vw,17px);
            color: var(--sb-muted);
            font-weight: 500;
        }
        .stats-val {
            font-size: clamp(15px,1.4vw,20px);
            color: var(--sb-fg);
            font-weight: 800;
            text-align: right;
            min-width: 5em;
        }

        /* ═══════════════════════════════
           MAIN PANEL
        ═══════════════════════════════ */
        .main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--white);
        }

        /* ── Header ── */
        .content-header {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: clamp(8px,1vw,14px);
            padding: 0 clamp(12px,1.5vw,20px);
            border-bottom: 1px solid var(--border);
            background: var(--white);
            min-height: clamp(50px,6.5vh,66px);
        }

        .header-accent {
            width: 4px;
            height: 1.3em;
            background: var(--red);
            border-radius: 2px;
            flex-shrink: 0;
        }

        .content-title {
            flex: 1;
            min-width: 0;
            font-size: clamp(13px,1.7vw,24px);
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
            word-break: keep-all;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: clamp(6px,.7vw,10px);
            flex-shrink: 0;
        }

        .header-actions {
            display: none;
            align-items: center;
            gap: 6px;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: clamp(6px,.8vh,9px) clamp(9px,1vw,13px);
            border: none;
            border-radius: 9999px;
            background: var(--red);
            color: #fff;
            font-size: clamp(10px,.9vw,12px);
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            box-shadow: 0 4px 14px var(--red-glow);
            transition: var(--tr);
            white-space: nowrap;
        }
        .action-btn:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(215,25,32,.4); }

        /* Zoom toolbar */
        .zoom-toolbar {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 9999px;
            padding: 4px 8px;
        }

        .zoom-btn {
            width: clamp(24px,2vw,30px);
            height: clamp(24px,2vw,30px);
            border: none;
            border-radius: 50%;
            background: var(--red);
            color: #fff;
            font-size: clamp(13px,1.2vw,17px);
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
        }
        .zoom-btn:hover { background: var(--red-dark); transform: scale(1.08); }

        .zoom-lbl {
            font-size: clamp(10px,.95vw,12px);
            font-weight: 600;
            color: var(--text);
            min-width: 38px;
            text-align: center;
        }

        /* ── Content Body ── */
        .content-body {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .content-body::-webkit-scrollbar { width: 6px; }
        .content-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tab-page { min-height: 100%; }

        /* ── Image zoom hint ── */
        .img-zoom-hint {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: clamp(10px,.95vw,12px);
            color: var(--text-muted);
            font-weight: 500;
            padding: 6px 10px;
            background: rgba(0,0,0,.04);
            border-radius: 9999px;
            border: 1px solid var(--border);
            align-self: center;
            user-select: none;
        }

        /* ═══════════════════════════════
           TAB 1 — 구역 개요
        ═══════════════════════════════ */
        .overview-tab {
            min-height: 100%;
            padding: clamp(16px,2.2vw,32px);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(14px,2vw,28px);
        }

        .overview-img {
            display: block;
            width: min(960px, 100%);
            height: auto;
            object-fit: contain;
            border-radius: var(--r);
            box-shadow: var(--sh-lg);
            background: var(--white);
            cursor: zoom-in;
            transition: box-shadow .2s ease, transform .2s ease;
        }
        .overview-img:hover { box-shadow: var(--sh-lg), 0 0 0 3px rgba(215,25,32,.25); transform: scale(1.005); }

        /* ═══════════════════════════════
           TAB 3 — 동의서 & 개인정보 이용 동의서 다운로드
        ═══════════════════════════════ */
        .download-tab {
            min-height: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(16px,3vw,40px);
            background: var(--bg);
        }

        .download-card {
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--sh-lg);
            padding: clamp(20px,3vw,40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(14px,2vh,22px);
            width: min(858px, 100%);
        }

        .download-label {
            font-size: clamp(20px,2vw,28px);
            font-weight: 700;
            color: var(--text);
            align-self: center;
        }

        .consent-preview {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: var(--sh-md);
            border: 1px solid var(--border);
            cursor: zoom-in;
            transition: box-shadow .2s ease;
        }
        .consent-preview:hover { box-shadow: var(--sh-lg), 0 0 0 3px rgba(215,25,32,.25); }

        .consent-button-row {
            display: flex;
            gap: clamp(8px,1.2vw,14px);
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        /* ═══════════════════════════════
           TAB 4 — 동의서 작성 예시
        ═══════════════════════════════ */
        .example-tab {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(16px,2.5vw,32px);
            padding: clamp(16px,2.5vw,36px);
            background: var(--bg);
        }

        .example-badge {
            font-size: clamp(20px,2vw,28px);
            font-weight: 700;
            color: var(--text);
            align-self: center;
        }

        .example-card {
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--sh-lg);
            padding: clamp(20px,3vw,40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(14px,2vh,22px);
            width: min(858px, 100%);
        }

        .example-preview {
            display: block;
            max-height: clamp(390px,84vh,884px);
            width: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 6px;
            border: 1px solid var(--border);
            box-shadow: var(--sh-md);
            cursor: zoom-in;
            transition: box-shadow .2s ease;
        }
        .example-preview:hover { box-shadow: var(--sh-lg), 0 0 0 3px rgba(215,25,32,.25); }

        .example-actions {
            display: flex;
            gap: clamp(8px,1.1vw,12px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .notice-card {
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--sh-lg);
            padding: clamp(16px,2.4vw,28px);
            width: min(858px, 100%);
            flex: none;
        }

        .notice-title {
            font-size: clamp(15px,1.7vw,24px);
            font-weight: 900;
            color: var(--red);
            margin-bottom: clamp(10px,1.5vh,18px);
        }

        .notice-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: clamp(8px,1.2vh,13px);
        }

        .notice-item {
            display: flex;
            align-items: flex-start;
            gap: 9px;
            font-size: clamp(12px,1.2vw,16px);
            font-weight: 500;
            color: var(--text);
            line-height: 1.6;
            word-break: keep-all;
        }

        .notice-num {
            width: clamp(18px,1.6vw,22px);
            height: clamp(18px,1.6vw,22px);
            border-radius: 50%;
            background: var(--red);
            color: #fff;
            font-size: clamp(9px,.82vw,11px);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* ═══════════════════════════════
           TAB 5 — 제출 폼
        ═══════════════════════════════ */
        .submit-tab {
            min-height: 100%;
            padding: clamp(16px,2.5vw,36px);
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .submit-card {
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--sh-lg);
            padding: clamp(18px,2.5vw,36px);
            width: min(660px, 100%);
        }

        .submit-card-title {
            font-size: clamp(14px,1.4vw,19px);
            font-weight: 700;
            color: var(--text);
            padding-bottom: clamp(10px,1.4vh,14px);
            margin-bottom: clamp(14px,2vh,22px);
            border-bottom: 2px solid var(--border);
        }

        .field-group { margin-bottom: clamp(12px,1.8vh,20px); }

        .field-label {
            display: block;
            font-size: clamp(12px,1.1vw,15px);
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .field-required { color: var(--red); margin-left: 2px; }

        .field-input {
            width: 100%;
            height: clamp(40px,5.2vh,48px);
            padding: 0 clamp(10px,1.1vw,14px);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: clamp(13px,1.15vw,16px);
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: var(--tr);
        }
        .field-input:focus {
            border-color: var(--red);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(215,25,32,.09);
        }

        .field-textarea {
            width: 100%;
            min-height: clamp(70px,10vh,96px);
            padding: clamp(10px,1.2vh,13px) clamp(10px,1.1vw,14px);
            border: 1.5px solid var(--border);
            border-radius: var(--r);
            font-size: clamp(13px,1.15vw,16px);
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            outline: none;
            resize: vertical;
            transition: var(--tr);
        }
        .field-textarea:focus {
            border-color: var(--red);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(215,25,32,.09);
        }

        .field-hint {
            font-size: clamp(10px,.93vw,12px);
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .file-input-hidden { display: none; }

        .upload-zone {
            display: flex;
            align-items: center;
            gap: clamp(10px,1.2vw,14px);
            padding: clamp(12px,1.6vh,18px) clamp(12px,1.4vw,16px);
            border: 2px dashed var(--border);
            border-radius: var(--r);
            cursor: pointer;
            transition: var(--tr);
            background: var(--bg);
        }
        .upload-zone:hover      { border-color: var(--red); background: rgba(215,25,32,.03); }
        .upload-zone.has-file   { border-color: var(--success); border-style: solid; background: rgba(16,185,129,.04); }

        .upload-icon            { font-size: clamp(22px,2.3vw,30px); flex-shrink: 0; line-height: 1; }
        .upload-text-wrap       { flex: 1; min-width: 0; }
        .upload-cta             { font-size: clamp(12px,1.1vw,15px); font-weight: 600; color: var(--text); display: block; }
        .upload-status-text     { font-size: clamp(10px,.92vw,12px); color: var(--text-muted); margin-top: 2px; display: block; word-break: break-all; }
        .upload-arrow           { color: var(--text-muted); font-size: clamp(16px,1.7vw,22px); flex-shrink: 0; transition: var(--tr); }
        .upload-zone:hover .upload-arrow { color: var(--red); }

        .submit-action-wrap {
            display: flex;
            align-items: center;
            gap: clamp(10px,1.4vw,14px);
            flex-wrap: wrap;
            margin-top: clamp(14px,2.2vh,24px);
        }

        .submit-help-text {
            font-size: clamp(11px,1vw,13px);
            color: var(--text-muted);
            word-break: keep-all;
        }

        .submit-button {
            padding: clamp(11px,1.5vh,15px) clamp(22px,2.8vw,34px);
            border: none;
            border-radius: 9999px;
            background: var(--red);
            color: #fff;
            font-size: clamp(13px,1.2vw,16px);
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            transition: var(--tr);
            box-shadow: 0 4px 16px var(--red-glow);
            white-space: nowrap;
        }
        .submit-button:hover:not(:disabled) { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(215,25,32,.4); }
        .submit-button:disabled             { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }

        .info-notice {
            margin-top: clamp(14px,2vh,22px);
            padding: clamp(12px,1.7vh,18px) clamp(12px,1.5vw,18px);
            border-radius: var(--r);
            background: var(--bg);
            border-left: 3px solid var(--red);
        }
        .info-notice-title { font-size: clamp(11px,1.05vw,14px); font-weight: 700; color: var(--red); margin-bottom: 8px; }
        .info-notice-item  { font-size: clamp(10px,.95vw,13px); color: var(--text-muted); line-height: 1.75; margin-bottom: 6px; word-break: keep-all; }
        .info-notice-item:last-child { margin-bottom: 0; }

        /* ═══════════════════════════════
           TAB 6 — 완료
        ═══════════════════════════════ */
        .complete-tab {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(14px,2.2vh,24px);
            background: linear-gradient(155deg, #fff5f5 0%, #fff 70%);
            padding: clamp(24px,4vw,64px);
            text-align: center;
        }

        .complete-icon-wrap {
            width: clamp(70px,8.5vw,110px);
            height: clamp(70px,8.5vw,110px);
            border-radius: 50%;
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px var(--red-glow);
            animation: popIn .55s cubic-bezier(.34,1.56,.64,1) both;
        }
        .complete-icon-wrap svg { width: clamp(36px,5vw,60px); height: clamp(36px,5vw,60px); }

        @keyframes popIn {
            0%   { transform: scale(0); opacity: 0; }
            60%  { transform: scale(1.12); }
            100% { transform: scale(1);   opacity: 1; }
        }

        .complete-title {
            font-size: clamp(22px,3.8vw,52px);
            font-weight: 900;
            color: var(--text);
            letter-spacing: -.02em;
            animation: fadeUp .45s ease .18s both;
        }
        .complete-sub {
            font-size: clamp(13px,1.45vw,20px);
            color: var(--text-muted);
            font-weight: 500;
            max-width: 420px;
            word-break: keep-all;
            line-height: 1.7;
            animation: fadeUp .45s ease .32s both;
        }
        .complete-red { color: var(--red); font-weight: 700; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Placeholder tab ── */
        .placeholder-tab {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            text-align: center;
            padding: 40px;
        }
        .placeholder-icon { font-size: clamp(44px,7.5vw,84px); opacity: .75; }
        .placeholder-text { font-size: clamp(18px,3vw,38px); font-weight: 900; opacity: .85; }
        .placeholder-sub  { font-size: clamp(12px,1.3vw,18px); opacity: .6; font-weight: 500; }

        /* ── Shared Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: clamp(9px,1.2vh,13px) clamp(16px,2vw,24px);
            border: none;
            border-radius: 9999px;
            background: var(--red);
            color: #fff;
            font-size: clamp(12px,1.1vw,15px);
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            text-decoration: none;
            transition: var(--tr);
            box-shadow: 0 4px 14px var(--red-glow);
            white-space: nowrap;
        }
        .btn:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(215,25,32,.4); }

        .btn-outline {
            background: transparent;
            color: var(--red);
            border: 2px solid var(--red);
            box-shadow: none;
        }
        .btn-outline:hover { background: var(--red); color: #fff; }

        /* ═══════════════════════════════
           MOBILE — Topbar & Drawer
        ═══════════════════════════════ */
        .topbar {
            display: none;
            flex-shrink: 0;
            background: var(--navy);
            border-bottom: 3px solid var(--red);
            padding: 8px 14px;
            align-items: center;
            gap: 12px;
            min-height: 56px;
        }
        .topbar-title {
            color: var(--sb-fg);
            font-size: 13px;
            font-weight: 700;
            line-height: 1.4;
            word-break: keep-all;
            flex: 1;
        }
        .topbar-btn {
            width: auto;
            height: auto;
            min-width: 48px;
            padding: 6px 10px;
            background: var(--red);
            border: 1px solid rgba(255,255,255,.25);
            border-radius: var(--r);
            color: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            flex-shrink: 0;
        }
        .topbar-btn-icon {
            font-size: 18px;
            line-height: 1;
        }
        .topbar-btn-label {
            font-size: 9px;
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            letter-spacing: 0.02em;
            opacity: .9;
        }

        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(2px);
        }
        .drawer-overlay.open { display: block; }

        .drawer-panel {
            position: absolute;
            top: 0; left: 0;
            width: min(286px, 86vw);
            height: 100%;
            background: linear-gradient(175deg, var(--navy) 0%, var(--navy-mid) 100%);
            display: flex;
            flex-direction: column;
            transform: translateX(-100%);
            transition: transform .27s cubic-bezier(.4,0,.2,1);
        }
        .drawer-overlay.open .drawer-panel { transform: translateX(0); }

        .drawer-accent { height: 3px; background: linear-gradient(90deg, var(--red), #ff4c54); flex-shrink: 0; }

        .drawer-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,.07);

        .drawer-close { width: 30px; height: 30px; background: rgba(255,255,255,.1); border: none; border-radius: 7px; color: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        .drawer-steps { flex: 1; overflow-y: auto; padding: 10px 10px; display: flex; flex-direction: column; }

        .drawer-stats {
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,.07);
            flex-shrink: 0;
        }

        /* ── Count animation ── */
        .count-anim {
            display: inline-block;
            position: relative;
            overflow: hidden;
            height: 1.35em;
            min-width: 4em;
            vertical-align: middle;
        }
        .count-anim .c-cur,
        .count-anim .c-nxt {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            white-space: nowrap;
            text-align: right;
        }
        .count-anim .c-nxt { transform: translateY(110%); }
        @keyframes cntOut { from{transform:translateY(0);opacity:1;} to{transform:translateY(-110%);opacity:0;} }
        @keyframes cntIn  { from{transform:translateY(110%);opacity:0;} to{transform:translateY(0);opacity:1;} }

        /* ── Lightbox ── */
        .lightbox-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0,0,0,.88);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
            padding: 20px;
        }
        .lightbox-overlay.open { display: flex; }
        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: var(--r);
            box-shadow: 0 20px 80px rgba(0,0,0,.5);
            cursor: default;
            animation: lbIn .2s ease;
        }
        @keyframes lbIn { from{transform:scale(.9);opacity:0;} to{transform:scale(1);opacity:1;} }
        .lightbox-close {
            position: fixed;
            top: 16px; right: 16px;
            width: 44px; height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,.15);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--tr);
            backdrop-filter: blur(4px);
            z-index: 501;
        }
        .lightbox-close:hover { background: rgba(255,255,255,.3); transform: scale(1.08); }

        /* ═══════════════════════════════
           RESPONSIVE
        ═══════════════════════════════ */
        @media (max-width: 640px) {
            .app                { flex-direction: column; height: auto; min-height: 100dvh; overflow: visible; }
            .sidebar            { display: none; }
            .main               { flex: 1; overflow: hidden; }
            .topbar             { display: flex; }
            .content-title      { font-size: 13px; }
            .content-header     { min-height: 46px; padding: 0 10px; gap: 6px; }

            .zoom-btn           { width: 22px; height: 22px; font-size: 12px; }
            .action-btn         { font-size: 10px; padding: 5px 9px; }
            .example-tab        { justify-content: flex-start; padding-top: 16px; }
            .notice-card        { max-width: 100%; }
            .download-tab       { align-items: flex-start; padding-top: 20px; }
            .download-card      { width: 100%; box-shadow: none; border-radius: var(--r); padding: 16px; }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .sidebar    { width: clamp(190px,25vw,268px); }
            .notice-card { width: min(480px,100%); }
        }

        @media (min-width: 1600px) {
            .sidebar { width: 320px; }
        }

        #printFrame { display: none; }
    </style>
</head>

    <!-- Lightbox -->
    <div class="lightbox-overlay" id="lightboxOverlay">
        <img class="lightbox-img" id="lightboxImg" src="" alt="">
        <button class="lightbox-close" id="lightboxClose">✕</button>
    </div>



    <script>
        const PDF_FILE                   = "assets/동의서 양식.pdf";
        const PRIVACY_CONSENT_PDF_FILE   = "assets/동의서 양식_개인정보 동의서_양식.pdf";
        const PREVIEW_IMAGE              = "assets/consent_form_preview.png";
        const COMBINED_PREVIEW_P1        = "assets/consent_combined_p1.png";
        const COMBINED_PREVIEW_P2        = "assets/consent_combined_p2.png";
        const EXAMPLE_PDF_FILE           = "assets/동의서 예시.pdf";
        const OVERVIEW_PDF_FILE          = "assets/구역개요_통합.pdf";
        const GOAL_PDF_FILE              = "assets/목표_통합.pdf";
        const EXAMPLE_IMAGE    = "assets/consent_example_preview.png";
        const GOAL_IMAGES = [
            "assets/goal_1.png",
            "assets/goal_2.png",
            "assets/goal_3.png"
        ];
        const OVERVIEW_IMAGES  = [
            "assets/card.png",
            "assets/overview_1.png",
            "assets/overview_2.png",
            "assets/overview_3.png",
            "assets/overview_4.png"
        ];

        const GOOGLE_APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw_txwGHXbPF2cFFKX-ZEkC8pE4V9pQ1CVEkQHqnzKcm7u1X653WVcSUOpQRTclb9y9/exec";
        const CONSENT_TOTAL_COUNT = 1196;

        const STEP_LABELS = [
            "내 물건이 구역에 포함되었는지 확인하기",
            "구역 개요",
            "목표 동의율 및 목표 기한",
            "동의서 & 개인정보 이용 동의서 다운로드",
            "2개의 동의서 손글씨로 작성하고 사진 찍기",
            "동의서 및 신분증 사진 제출하기",
            "완료, 감사합니다!"
        ];

        let pageZoom   = 1.0;
        let currentTab = 0;

        function buildStepItems(containerEl, isMobile) {
            containerEl.innerHTML = "";
            STEP_LABELS.forEach((label, i) => {
                const n = i;
                const btn = document.createElement("button");
                btn.className = "step-btn" + (n === currentTab ? " active" : "");
                btn.setAttribute("data-tab", n);
                btn.innerHTML =
                    `<span class="step-circle">${n}</span>` +
                    `<span class="step-label">${n}. ${label}</span>`;
                btn.onclick = () => { changeTab(n); if (isMobile) closeDrawer(); };
                containerEl.appendChild(btn);
                if (n < STEP_LABELS.length - 1) {
                    const conn = document.createElement("div");
                    conn.className = "step-row";
                    conn.innerHTML = '<div class="step-connector"><div class="step-connector-line"></div></div>';
                    containerEl.appendChild(conn);
                }
            });
        }

        function refreshStepActive() {
            ["sidebarSteps", "drawerSteps"].forEach(id => {
                const c = document.getElementById(id);
                if (!c) return;
                c.querySelectorAll(".step-btn").forEach(btn => {
                    btn.classList.toggle("active", Number(btn.getAttribute("data-tab")) === currentTab);
                });
            });
        }

        function openDrawer()  { document.getElementById("drawerOverlay").classList.add("open"); }
        function closeDrawer() { document.getElementById("drawerOverlay").classList.remove("open"); }
        function onOverlayClick(e) { if (e.target === document.getElementById("drawerOverlay")) closeDrawer(); }

        function applyPageZoom() {
            const body = document.getElementById("contentBody");
            const lbl  = document.getElementById("pageZoomText");
            if (body && body.firstElementChild) body.firstElementChild.style.zoom = pageZoom;
            if (lbl) lbl.textContent = Math.round(pageZoom * 100) + "%";
        }

        function zoomPage(delta) {
            pageZoom = Math.max(0.5, Math.min(2.0, pageZoom + delta));
            applyPageZoom();
        }

        /* Count slot animation */
        function animateCount(elId, newText) {
            const el = document.getElementById(elId);
            if (!el) return;
            if (!el._animInit) {
                el._animInit = true;
                el.classList.add("count-anim");
                const cur = document.createElement("span");
                cur.className = "c-cur";
                cur.textContent = newText;
                el.textContent = "";
                el.appendChild(cur);
                return;
            }
            const cur = el.querySelector(".c-cur");
            if (cur && cur.textContent === newText) return;
            const nxt = document.createElement("span");
            nxt.className = "c-nxt";
            nxt.textContent = newText;
            el.appendChild(nxt);
            void nxt.offsetWidth;
            if (cur) cur.style.animation = "cntOut .35s ease forwards";
            nxt.style.animation = "cntIn .35s ease forwards";
            setTimeout(() => {
                if (cur) cur.remove();
                nxt.className = "c-cur";
                nxt.style.animation = "";
            }, 380);
        }

        function updateConsentStatsBox(count) {
            [["currentConsentCount","currentConsentRate"],
             ["mobileConsentCount","mobileConsentRate"]].forEach(([cId, rId]) => {
                const cEl = document.getElementById(cId);
                const rEl = document.getElementById(rId);
                if (!cEl || !rEl) return;
                if (count === null || count === undefined || count === "") {
                    animateCount(cId, "확인 불가");
                    rEl.textContent = "확인 불가";
                    return;
                }
                const n = Number(count);
                if (!Number.isFinite(n)) {
                    animateCount(cId, "확인 불가");
                    rEl.textContent = "확인 불가";
                    return;
                }
                animateCount(cId, String(n));
                rEl.textContent = (n * 100 / CONSENT_TOTAL_COUNT).toFixed(2) + "%";
            });
        }

        function loadConsentStatsFromGoogleSheet() {
            const cb = "handleConsentStats_" + Date.now();
            const s  = document.createElement("script");
            window[cb] = function(data) {
                try { updateConsentStatsBox(data && data.success ? data.highestUniqueNumber : null); }
                finally { delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s); }
            };
            s.onerror = function() {
                updateConsentStatsBox(null);
                delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s);
            };
            s.src = GOOGLE_APPS_SCRIPT_WEB_APP_URL + "?callback=" + encodeURIComponent(cb) + "&t=" + Date.now();
            document.body.appendChild(s);
        }

        /* Lightbox */
        function openLightbox(src, alt) {
            document.getElementById("lightboxImg").src = src;
            document.getElementById("lightboxImg").alt = alt || "";
            document.getElementById("lightboxOverlay").classList.add("open");
        }
        function closeLightbox() {
            document.getElementById("lightboxOverlay").classList.remove("open");
        }
        function initLightbox() {
            document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
            document.getElementById("lightboxOverlay").addEventListener("click", function(e) {
                if (e.target !== document.getElementById("lightboxImg")) closeLightbox();
            });
            document.addEventListener("keydown", function(e) {
                if (e.key === "Escape") closeLightbox();
            });
            document.getElementById("contentBody").addEventListener("click", function(e) {
                if (e.target.tagName === "IMG") openLightbox(e.target.src, e.target.alt);
            });
            document.addEventListener("visibilitychange", function() {
                if (document.hidden) closeLightbox();
            });
            window.addEventListener("blur", closeLightbox);
        }

        const ZOOM_HINT = `<div class="img-zoom-hint">🔍 사진을 클릭하면 확대할 수 있습니다</div>`;

        const TAB_TITLES = [
            "0. 내 물건이 구역에 포함되었는지 확인하기",
            "1. 구역 개요",
            "2. 목표 동의율 및 목표 기한",
            "3. 동의서 & 개인정보 이용 동의서 다운로드",
            "4. 2개의 동의서 손글씨로 작성하고 사진 찍기",
            "5. 동의서 및 신분증 사진 제출하기",
            "6. 완료, 감사합니다!"
        ];

        function changeTab(n) {
            currentTab = n;
            refreshStepActive();

            document.getElementById("contentTitle").textContent = TAB_TITLES[n];
            document.getElementById("contentBody").scrollTop = 0;

            const acts = document.getElementById("headerActions");
            if (n === 1) {
                acts.innerHTML = `<button class="action-btn" onclick="downloadAllOverviewImages()">⬇ 일괄 다운로드</button>
                                  <button class="action-btn" onclick="printAllOverviewImages()">🖨 일괄 인쇄</button>`;
                acts.style.display = "flex";
            } else if (n === 2) {
                acts.innerHTML = `<button class="action-btn" onclick="downloadAllGoalImages()">⬇ 일괄 다운로드</button>
                                  <button class="action-btn" onclick="printAllGoalImages()">🖨 일괄 인쇄</button>`;
                acts.style.display = "flex";
            } else {
                acts.style.display = "none";
            }

            const body = document.getElementById("contentBody");

            if (n === 0) {
                body.innerHTML =
                    `<div class="tab-page" style="background:#fff;display:flex;align-items:center;justify-content:center;min-height:100%;">
                        <a href="https://rladyddn0314.github.io/Banpo_Map_Page_Final/" target="_blank" rel="noopener"
                           style="display:inline-block;background:#d71920;color:#fff;font-size:clamp(16px,2.2vw,26px);
                                  font-weight:800;padding:28px 48px;border-radius:16px;text-decoration:none;
                                  text-align:center;line-height:1.5;box-shadow:0 6px 24px rgba(215,25,32,.35);
                                  letter-spacing:-0.01em;word-break:keep-all;max-width:600px;">
                            내 물건이 구역에 포함되었는지<br>확인하러 가기
                        </a>
                    </div>`;
            }

            else if (n === 1) {
                body.innerHTML =
                    `<div class="tab-page overview-tab">` +
                        ZOOM_HINT +
                        OVERVIEW_IMAGES.map((src, i) =>
                            `<img class="overview-img" src="${src}" alt="구역 개요 이미지 ${i+1}">`
                        ).join("") +
                    `</div>`;
            }

            else if (n === 2) {
                body.innerHTML =

        function setupSubmitPageValidation() {
            const ownerName              = document.getElementById("ownerName");
            const landNumber             = document.getElementById("landNumber");
            const unitNumber             = document.getElementById("unitNumber");
            const ownerPhone             = document.getElementById("ownerPhone");
            const ownerMessage           = document.getElementById("ownerMessage");
            const consentUpload          = document.getElementById("consentUpload");
            const privacyConsentUpload   = document.getElementById("privacyConsentUpload");
            const idUpload               = document.getElementById("idUpload");
            const consentUploadStatus        = document.getElementById("consentUploadStatus");
            const privacyConsentUploadStatus = document.getElementById("privacyConsentUploadStatus");
            const idUploadStatus             = document.getElementById("idUploadStatus");
            const submitAllButton        = document.getElementById("submitAllButton");
            const charCountDisplay       = document.getElementById("charCountDisplay");
            const consentZone            = document.getElementById("consentZone");
            const privacyConsentZone     = document.getElementById("privacyConsentZone");
            const idZone                 = document.getElementById("idZone");

            function updateSubmitButtonState() {
                const allText =
                    ownerName.value.trim()  !== "" &&
                    landNumber.value.trim() !== "" &&
                    ownerPhone.value.trim() !== "";
                const allFiles =
                    consentUpload.files.length > 0 &&
                    privacyConsentUpload.files.length > 0 &&
                    idUpload.files.length > 0;
                submitAllButton.disabled = !(allText && allFiles);
            }

            function updateUploadStatus(input, statusEl, zoneEl) {
                if (input.files.length > 0) {
                    statusEl.textContent = input.files[0].name + " 파일의 업로드가 완료되었습니다.";
                    zoneEl.classList.add("has-file");
                } else {
                    statusEl.textContent = "";
                    zoneEl.classList.remove("has-file");
                }
                updateSubmitButtonState();
            }

            function allowOnlyNumberInput(el) {
                el.addEventListener("beforeinput", e => { if (e.data && /[^0-9]/.test(e.data)) e.preventDefault(); });
                el.addEventListener("paste", e => {
                    const t = (e.clipboardData || window.clipboardData).getData("text");
                    if (/[^0-9]/.test(t)) e.preventDefault();
                });
                el.addEventListener("drop", e => e.preventDefault());
                el.addEventListener("input", () => { el.value = el.value.replace(/[^0-9]/g, ""); updateSubmitButtonState(); });
            }

            allowOnlyNumberInput(ownerPhone);

            ownerName.addEventListener("input",    updateSubmitButtonState);
            landNumber.addEventListener("input",   updateSubmitButtonState);
            ownerPhone.addEventListener("input",   updateSubmitButtonState);
            ownerMessage.addEventListener("input", function() {
                if (charCountDisplay) charCountDisplay.textContent = ownerMessage.value.length + " / 50자";
                updateSubmitButtonState();
            });

            consentUpload.addEventListener("change",        () => updateUploadStatus(consentUpload, consentUploadStatus, consentZone));
            privacyConsentUpload.addEventListener("change", () => updateUploadStatus(privacyConsentUpload, privacyConsentUploadStatus, privacyConsentZone));
            idUpload.addEventListener("change",             () => updateUploadStatus(idUpload, idUploadStatus, idZone));

            submitAllButton.addEventListener("click", submitAllDataToGoogle);
            updateSubmitButtonState();
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload  = () => resolve({ fileName: file.name, mimeType: file.type || "application/octet-stream", base64Data: String(reader.result).split(",")[1] });
                reader.onerror = () => reject(new Error("파일을 읽는 중 오류가 발생했습니다."));
                reader.readAsDataURL(file);
            });
        }

        function gasJsonp_(buildUrl, parseResult) {
            return new Promise(resolve => {
                const cb = "gasCallback_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
                const s  = document.createElement("script");
                let settled = false;
                const finish = val => {
                    if (settled) return; settled = true;
                    delete window[cb]; if (s.parentNode) s.parentNode.removeChild(s);
                    resolve(val);
                };
                window[cb] = data => finish(parseResult(data));
                s.onerror   = ()   => finish(null);
                setTimeout(()      => finish(null), 15000);
                s.src = buildUrl(cb);
                document.body.appendChild(s);
            });
        }

        async function withRetry_(fn, maxTries, baseDelayMs) {
            for (let i = 0; i < maxTries; i++) {
                const result = await fn();
                if (result !== null) return result;
                if (i < maxTries - 1) await new Promise(r => setTimeout(r, baseDelayMs * (i + 1)));
            }
            return null;
        }

        function checkDuplicateSubmission(ownerNameValue, ownerPhoneValue) {
            return withRetry_(() => gasJsonp_(
                cb => GOOGLE_APPS_SCRIPT_WEB_APP_URL
                    + "?callback=" + encodeURIComponent(cb)
                    + "&action=checkDuplicate"
                    + "&ownerName="  + encodeURIComponent(ownerNameValue)
                    + "&ownerPhone=" + encodeURIComponent(ownerPhoneValue)
                    + "&t=" + Date.now(),
                data => (data && data.success === true) ? data : null
            ), 3, 2000);
        }

        function getCurrentHighestUniqueNumberForSubmit() {
            return withRetry_(() => gasJsonp_(
                cb => GOOGLE_APPS_SCRIPT_WEB_APP_URL + "?callback=" + encodeURIComponent(cb) + "&t=" + Date.now(),
                data => (data && data.success) ? Number(data.highestUniqueNumber || 0) : null
            ), 3, 2000);
        }

        async function submitAllDataToGoogle() {
            const ownerName            = document.getElementById("ownerName");
            const landNumber           = document.getElementById("landNumber");
            const unitNumber           = document.getElementById("unitNumber");
            const ownerPhone           = document.getElementById("ownerPhone");
            const ownerMessage         = document.getElementById("ownerMessage");
            const consentUpload        = document.getElementById("consentUpload");
            const privacyConsentUpload = document.getElementById("privacyConsentUpload");
            const idUpload             = document.getElementById("idUpload");
            const submitAllButton      = document.getElementById("submitAllButton");

            if (GOOGLE_APPS_SCRIPT_WEB_APP_URL === "여기에_구글_앱스_스크립트_웹앱_URL을_붙여넣으세요") {
                alert("Google Apps Script 웹 앱 URL을 먼저 코드에 입력해야 합니다."); return;
            }

            try {
                submitAllButton.disabled = true;
                submitAllButton.textContent = "제출 중...";

                const ownerNameValue  = ownerName.value.trim();
                const ownerPhoneValue = ownerPhone.value.trim();

                const dupResult = await checkDuplicateSubmission(ownerNameValue, ownerPhoneValue);

                let updateExisting = false, existingUniqueNumber = "", existingRowNumber = "";

                if (dupResult && dupResult.success === true && dupResult.duplicateExists === true) {
                    const ok = confirm("이전에 제출된 내역이 있습니다. 현재의 내용으로 갱신하시겠습니까?");
                    if (!ok) { submitAllButton.disabled = false; submitAllButton.textContent = "전체 제출"; return; }
                    updateExisting = true;
                    existingUniqueNumber = dupResult.uniqueNumber || "";
                    existingRowNumber    = dupResult.rowNumber    || "";
                }

                const consentFileData        = await fileToBase64(consentUpload.files[0]);
                const privacyConsentFileData = await fileToBase64(privacyConsentUpload.files[0]);
                const idFileData             = await fileToBase64(idUpload.files[0]);

                const payload = {
                    action: "submitConsent",
                    updateExisting, existingUniqueNumber, existingRowNumber,
                    ownerName:           ownerNameValue,
                    landNumber:          landNumber.value.trim(),
                    unitNumber:          unitNumber.value.trim(),
                    ownerPhone:          "\'" + ownerPhoneValue,
                    ownerMessage:        ownerMessage.value.trim(),
                    consentFile:         consentFileData,
                    privacyConsentFile:  privacyConsentFileData,
                    idFile:              idFileData
                };

                await fetch(GOOGLE_APPS_SCRIPT_WEB_APP_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(payload)
                });

                alert(updateExisting ? "갱신이 처리되었습니다." : "제출이 완료되었습니다. 감사합니다.");
                changeTab(6);

            } catch (err) {
                alert("제출 중 오류가 발생했습니다. 다시 시도해 주세요.");
                submitAllButton.disabled = false; submitAllButton.textContent = "전체 제출";
            }
        }
